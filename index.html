.container{max-width:480px;margin:0 auto;padding:16px}
.header{text-align:center;padding:16px 0 20px}

.locker-row.disponible{border-left-color:#28a745;cursor:pointer}

.locker-row.ocupado{border-left-color:#dc3545}

.locker-row.revisar{border-left-color:#6c757d}

.disponible .locker-numero{background:#d4edda;color:#155724}
.ocupado .locker-numero{background:#f8d7da;color:#721c24}
.pendiente .locker-numero{background:#fff3cd;color:#856404}
.revisar .locker-numero{background:#e2e3e5;color:#383d41}

.locker-accion{font-size:11px;color:#0078d4;font-weight:500}
.locker-arrow{margin-left:8px;color:#0078d4;flex-shrink:0;font-size:18px}
.loading{text-align:center;padding:60px 20px}
.error-msg{background:#f8d7da;color:#721c24;padding:14px 16px;border-radius:10px;font-size:14px;text-align:center;margin-top:20px}
.footer{text-align:center;padding:20px 0;font-size:11px;color:#bbb}
.aviso{background:#e8f4fd;border-radius:10px;padding:12px 14px;font-size:12px;color:#0c5460;margin-bottom:14px;line-height:1.5;border:1px solid #bee5eb}
.aviso strong{display:block;margin-bottom:3px}

function init(){
var params=new URLSearchParams(window.location.search);
var modulo=params.get('modulo');
if(!modulo){document.getElementById('contenido').innerHTML='<div class="error-msg">No se especific\u00f3 un m\u00f3dulo. Escane\u00e1 el c\u00f3digo QR del mueble.</div>';return;}
var grupo=null;
for(var i=0;i<DATOS.modulos.length;i++){if(DATOS.modulos[i].modulo===modulo){grupo=DATOS.modulos[i];break;}}
if(!grupo){document.getElementById('contenido').innerHTML='<div class="error-msg">M\u00f3dulo no encontrado. Verific\u00e1 el c\u00f3digo QR.</div>';return;}
mostrarModulo(grupo);
}

function mostrarModulo(g){
document.getElementById('subtitulo').textContent=g.edificio+' \u00b7 '+g.planta;
var ls=g.lockers,d=0,o=0,p=0,r=0;
for(var i=0;i<ls.length;i++){var e=ls[i].estado.toLowerCase();if(e==='disponible')d++;else if(e==='ocupado')o++;else if(e==='pendiente')p++;else if(e==='revisar')r++;}
var h='<div class="resumen">';
h+='<div class="resumen-item"><div class="resumen-num num-disponible">'+d+'</div><div class="resumen-label">Disponibles</div></div>';
h+='<div class="resumen-item"><div class="resumen-num num-ocupado">'+o+'</div><div class="resumen-label">Ocupados</div></div>';
if(p>0)h+='<div class="resumen-item"><div class="resumen-num num-pendiente">'+p+'</div><div class="resumen-label">Pendientes</div></div>';
if(r>0)h+='<div class="resumen-item"><div class="resumen-num num-revisar">'+r+'</div><div class="resumen-label">Revisar</div></div>';
h+='</div>';
h+='<div class="aviso"><strong>\u00bfNecesit\u00e1s un locker?</strong>Toc\u00e1 sobre cualquier locker disponible para solicitar la asignaci\u00f3n.</div>';
h+='<div class="lockers-list">';
for(var i=0;i<ls.length;i++){
var l=ls[i],c=l.estado.toLowerCase(),cl=c==='disponible';
h+='<div class="locker-row '+c+'"'+(cl?' onclick="solicitar(\''+l.id.replace(/'/g,"\\'")+'\',\''+l.numero.replace(/'/g,"\\'")+'\')"':'')+'>'; 
h+='<div class="locker-numero">'+l.numero+'</div><div class="locker-info">';
if(c==='ocupado'){h+='<div class="locker-estado">Ocupado</div><div class="locker-ocupante">'+l.ocupante+'</div>';}
else if(c==='disponible'){h+='<div class="locker-estado">Disponible</div><div class="locker-accion">Tocar para solicitar</div>';}
else if(c==='pendiente'){h+='<div class="locker-estado">Pendiente</div><div class="locker-ocupante">Solicitud en proceso</div>';}
else if(c==='revisar'){h+='<div class="locker-estado">En revisi\u00f3n</div><div class="locker-ocupante">'+(l.ocupante||'Pendiente de revisi\u00f3n')+'</div>';}
h+='</div>';if(cl)h+='<div class="locker-arrow">\u203a</div>';h+='</div>';}
h+='</div>';
document.getElementById('contenido').innerHTML=h;
}

var url=FORM_URL;
